<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Falcon — Intro</title>
<style>
  :root{
    --void:#040507;
    --ice:#eaf6ff;
    --blue:#3fb6ff;
    --blue-deep:#0a63c9;
    --orange:#ff8a1f;
    --orange-deep:#c94e00;
    --chrome-1:#f4f6f8;
    --chrome-2:#aab4bd;
    --chrome-3:#5b636b;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--void);
    overflow:hidden;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  #stage{
    position:relative;
    width:100vw; height:100vh;
    min-height:560px;
    background:#000000;
    overflow:hidden;
  }
  canvas#fx{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }
  /* subtle vignette + grain-ish depth */
  #vignette{
    position:absolute; inset:0;
    pointer-events:none;
    background:none;
  }
  #camera{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    will-change: transform;
    transform-origin:50% 50%;
  }
  #logoWrap{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center;
    opacity:0;
    filter: blur(14px);
    transform: scale(0.82) rotateY(0deg);
    transform-style:preserve-3d;
    will-change: transform, filter, opacity;
  }
  #glow{
    position:absolute;
    width:640px; height:640px;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(90,180,255,0.28) 0%, rgba(90,180,255,0.10) 35%, rgba(90,180,255,0) 65%);
    filter:blur(4px);
    opacity:0;
    pointer-events:none;
  }
  #logoImg{
    width:min(46vw, 460px);
    height:auto;
    display:block;
    filter: drop-shadow(0 0 22px rgba(80,170,255,0.30)) drop-shadow(0 0 46px rgba(255,140,40,0.20));
  }
</style>
</head>

<script>
(function(){
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const camera = document.getElementById('camera');
  const logoWrap = document.getElementById('logoWrap');
  const glow = document.getElementById('glow');

  let W, H, DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = stage.clientWidth; H = stage.clientHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const CX = ()=> W/2, CY = ()=> H*0.46;

  // ---------- Timeline (ms) ----------
  const T_STREAK_IN   = 3400;   // streaks flying in from all directions
  const T_CONVERGE    = 2500;   // streaks curve inward & orbit, logo begins forming
  const T_ASSEMBLE    = 900;    // logo snaps into full clarity
  const T_SHIMMER     = 1300;   // streaks dissolve into particle shimmer, drift outward
  const T_HOLD        = 3600;   // final hero hold: rotate, glow, dust
  const T_FADEOUT      = 900;    // fade to black before loop
  const TOTAL = T_STREAK_IN + T_CONVERGE + T_ASSEMBLE + T_SHIMMER + T_HOLD + T_FADEOUT;

  const t1 = T_STREAK_IN;
  const t2 = t1 + T_CONVERGE;
  const t3 = t2 + T_ASSEMBLE;
  const t4 = t3 + T_SHIMMER;
  const t5 = t4 + T_HOLD;
  const t6 = t5 + T_FADEOUT; // = TOTAL

  function easeInOut(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
  function clamp01(v){ return Math.max(0, Math.min(1, v)); }
  function lerp(a,b,t){ return a+(b-a)*t; }

  // ---------- Streak particles (phase 1 + 2) ----------
  class Streak{
    constructor(){ this.reset(true); }
    reset(initial){
      const angle = Math.random()*Math.PI*2;
      const dist = Math.max(W,H)*(0.75+Math.random()*0.55);
      this.sx = CX() + Math.cos(angle)*dist;
      this.sy = CY() + Math.sin(angle)*dist;
      // control point offset for curved comet path
      const perp = angle + (Math.random()<0.5? 1:-1)*(0.35+Math.random()*0.5);
      const bend = dist*(0.35+Math.random()*0.45);
      this.cx = CX() + Math.cos(perp)*bend*0.6 + (Math.cos(angle)*dist*0.4);
      this.cy = CY() + Math.sin(perp)*bend*0.6 + (Math.sin(angle)*dist*0.4);
      this.ex = CX() + (Math.random()-0.5)*40;
      this.ey = CY() + (Math.random()-0.5)*40;
      this.delay = initial ? Math.random()*T_STREAK_IN : 0;
      this.dur = 1400 + Math.random()*1600;
      this.len = 60 + Math.random()*140;
      this.width = 0.6 + Math.random()*1.8;
      this.hue = Math.random()<0.55 ? 'blue' : 'white';
      this.spawnAt = this.delay;
    }
    // position along quadratic bezier at progress p [0,1]
    pointAt(p){
      const u = 1-p;
      const x = u*u*this.sx + 2*u*p*this.cx + p*p*this.ex;
      const y = u*u*this.sy + 2*u*p*this.cy + p*p*this.ey;
      return {x,y};
    }
    draw(elapsed){
      const local = elapsed - this.spawnAt;
      if(local < 0) return;
      let p = local / this.dur;
      if(p > 1){ return; }
      const pe = easeInOut(clamp01(p));
      const head = this.pointAt(pe);
      const tailP = clamp01(pe - this.len/ (Math.max(W,H)));
      const tail = this.pointAt(tailP);
      const fadeIn = clamp01(p/0.08);
      const fadeOut = clamp01((1-p)/0.15);
      const alpha = Math.min(fadeIn, fadeOut);
      if(alpha <= 0.01) return;
      const grad = ctx.createLinearGradient(tail.x, tail.y, head.x, head.y);
      const c = this.hue==='blue' ? '63,182,255' : '235,247,255';
      grad.addColorStop(0, `rgba(${c},0)`);
      grad.addColorStop(1, `rgba(${c},${0.85*alpha})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = this.width;
      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.lineTo(head.x, head.y);
      ctx.stroke();
      // bright head dot
      ctx.beginPath();
      ctx.fillStyle = `rgba(${c},${0.9*alpha})`;
      ctx.arc(head.x, head.y, this.width*1.1, 0, Math.PI*2);
      ctx.fill();
    }
  }

  const streaks = [];
  const STREAK_COUNT = 70;
  for(let i=0;i<STREAK_COUNT;i++) streaks.push(new Streak());

  // ---------- Orbiting converge particles (phase ~2) ----------
  class Orbiter{
    constructor(){ this.reset(); }
    reset(){
      this.angle0 = Math.random()*Math.PI*2;
      this.r0 = 260 + Math.random()*260;
      this.r1 = 40 + Math.random()*30;
      this.speed = (Math.random()<0.5?1:-1) * (0.8+Math.random()*1.6);
      this.startAt = t1 + Math.random()*(T_CONVERGE*0.6);
      this.dur = T_CONVERGE*0.7 + Math.random()*T_CONVERGE*0.5;
      this.hue = Math.random()<0.6 ? 'blue' : 'white';
      this.size = 0.8 + Math.random()*1.6;
    }
    draw(elapsed){
      const local = elapsed - this.startAt;
      if(local<0 || local>this.dur) return;
      const p = easeInOut(clamp01(local/this.dur));
      const r = lerp(this.r0, this.r1, p);
      const ang = this.angle0 + this.speed*p*Math.PI*1.4;
      const x = CX() + Math.cos(ang)*r;
      const y = CY() + Math.sin(ang)*r*0.72;
      const alpha = Math.sin(p*Math.PI)*0.9 + 0.1;
      const c = this.hue==='blue' ? '63,182,255' : '235,247,255';
      ctx.beginPath();
      ctx.fillStyle = `rgba(${c},${alpha*0.85})`;
      ctx.arc(x,y,this.size*(1+p),0,Math.PI*2);
      ctx.fill();
    }
  }
  const orbiters = [];
  for(let i=0;i<90;i++) orbiters.push(new Orbiter());

  // ---------- Shimmer burst (phase 4) ----------
  class Shimmer{
    constructor(){ this.reset(); }
    reset(){
      this.angle = Math.random()*Math.PI*2;
      this.speed = 40 + Math.random()*140;
      this.startAt = t3 + Math.random()*(T_SHIMMER*0.5);
      this.dur = T_SHIMMER*0.6 + Math.random()*T_SHIMMER*0.6;
      this.hue = Math.random()<0.5 ? 'blue' : 'white';
      this.size = 0.6 + Math.random()*1.4;
      this.r0 = 20 + Math.random()*60;
    }
    draw(elapsed){
      const local = elapsed - this.startAt;
      if(local<0 || local>this.dur) return;
      const p = clamp01(local/this.dur);
      const dist = this.r0 + this.speed*p;
      const x = CX() + Math.cos(this.angle)*dist;
      const y = CY() + Math.sin(this.angle)*dist*0.75;
      const alpha = (1-p);
      const c = this.hue==='blue' ? '63,182,255' : '235,247,255';
      ctx.beginPath();
      ctx.fillStyle = `rgba(${c},${alpha*0.8})`;
      ctx.arc(x,y,this.size,0,Math.PI*2);
      ctx.fill();
    }
  }
  const shimmers = [];
  for(let i=0;i<140;i++) shimmers.push(new Shimmer());

  // ---------- Ambient dust (always present, subtle) ----------
  class Dust{
    constructor(){
      this.x = Math.random()*W;
      this.y = Math.random()*H;
      this.z = Math.random(); // depth for parallax + size
      this.speed = 3 + this.z*10;
      this.size = 0.4 + this.z*1.4;
      this.phase = Math.random()*Math.PI*2;
    }
    step(dt){
      this.y -= this.speed*dt/1000;
      this.x += Math.sin(this.phase + this.y*0.01)*0.06;
      if(this.y < -10){ this.y = H+10; this.x = Math.random()*W; }
    }
    draw(alphaMul){
      const tw = 0.35 + 0.35*Math.sin(this.phase*3);
      ctx.beginPath();
      ctx.fillStyle = `rgba(200,225,255,${(0.10+this.z*0.18)*alphaMul*(0.7+tw*0.3)})`;
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  const dust = [];
  for(let i=0;i<90;i++) dust.push(new Dust());

  // ---------- Main loop ----------
  let start = performance.now();

  function frame(now){
    let elapsed = (now - start) % TOTAL;

    // background clear with slight trail for glow persistence
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fillRect(0,0,W,H);

    // ---- Camera slow dolly-in across whole sequence ----
    const camProgress = clamp01(elapsed/t5);
    const scale = 1 + easeInOut(camProgress)*0.22;
    camera.style.transform = `scale(${scale})`;

    // ---- Ambient dust always drifting ----
    let dustAlpha = 1;
    if(elapsed > t5) dustAlpha = 1 - clamp01((elapsed-t5)/T_FADEOUT);
    dust.forEach(d=>{ d.step(16); d.draw(dustAlpha); });

    // ---- Phase-specific effects ----
    if(elapsed < t2){
      streaks.forEach(s=>s.draw(elapsed));
    }
    if(elapsed >= t1*0.4 && elapsed < t3){
      orbiters.forEach(o=>o.draw(elapsed));
    }
    if(elapsed >= t3 && elapsed < t4 + 200){
      shimmers.forEach(s=>s.draw(elapsed));
    }

    // ---- Logo reveal timeline ----
    let logoOpacity = 0, logoBlur = 14, logoScale = 0.82, glowOpacity = 0;
    if(elapsed < t1){
      logoOpacity = 0;
    } else if(elapsed < t3){
      const p = easeInOut(clamp01((elapsed - t1)/(t3-t1)));
      logoOpacity = p;
      logoBlur = lerp(14, 0, p);
      logoScale = lerp(0.82, 1, p);
      glowOpacity = p*0.85;
    } else if(elapsed < t5){
      logoOpacity = 1; logoBlur = 0; logoScale = 1; glowOpacity = 0.85;
    } else {
      const p3 = clamp01((elapsed - t5)/T_FADEOUT);
      logoOpacity = 1 - p3;
      glowOpacity = 0.85*(1-p3);
    }

    // gentle rotation during hold phase (final hero shot)
    let rotY = 0;
    if(elapsed >= t3){
      const holdT = (elapsed - t3)/1000;
      rotY = Math.sin(holdT*0.55) * 10; // degrees, slow oscillation
    }

    logoWrap.style.opacity = logoOpacity;
    logoWrap.style.filter = `blur(${logoBlur}px)`;
    logoWrap.style.transform = `scale(${logoScale}) rotateY(${rotY}deg)`;
    glow.style.opacity = glowOpacity;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
