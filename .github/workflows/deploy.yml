name: Deploy Vite to Coolify

on:
  push:
    branches:
      - develop
      - main
      - beta

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.pm.outputs.manager }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --immutable
              ;;
            npm)
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              ;;
          esac

      - name: Build
        shell: bash
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm)
              pnpm build
              ;;
            yarn)
              yarn build
              ;;
            npm)
              npm run build
              ;;
          esac

      - name: Deploy to deploy branch
        shell: bash
        run: |
          set -e

          SOURCE_BRANCH="${GITHUB_REF_NAME}"
          DEPLOY_BRANCH="deploy/${SOURCE_BRANCH}"

          echo "Deploy branch: ${DEPLOY_BRANCH}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TMP_DIR=$(mktemp -d)

          # Copy build output
          cp -R dist/. "$TMP_DIR/"

          # Copy deploy files
          cp .github/deploy/Dockerfile "$TMP_DIR/Dockerfile"
          cp .github/deploy/nginx.conf "$TMP_DIR/nginx.conf"

          touch "$TMP_DIR/.nojekyll"

          # Checkout deploy branch
          if git ls-remote --exit-code origin "${DEPLOY_BRANCH}" >/dev/null 2>&1; then
            git checkout "${DEPLOY_BRANCH}"
          else
            git checkout --orphan "${DEPLOY_BRANCH}"
          fi

          # Remove old files
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +

          # Copy new files
          cp -R "$TMP_DIR"/. .

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy ${SOURCE_BRANCH} (${GITHUB_SHA})"

          git push origin "${DEPLOY_BRANCH}" --force
